services:
  vibebot:
    build: .
    image: vibebot:dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - ircd

  ircd:
    image: ghcr.io/ergochat/ergo:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:6667:6667"
      - "127.0.0.1:6697:6697"
    volumes:
      - ./data/ircd:/ircd
